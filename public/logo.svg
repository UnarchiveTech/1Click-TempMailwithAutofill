
<svg width="130" height="40" viewBox="0 0 130 40"
     xmlns="http://www.w3.org/2000/svg">
    <defs>
        <!-- Gradient -->
        <linearGradient id="gradAuto" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#F97316"/>
            <stop offset="100%" stop-color="#2563EB"/>
        </linearGradient>

        <!-- Adaptive Styles -->
        <style>
            .text { font-family: Poppins, Inter, Arial, sans-serif; font-weight: 600; }
            .number { fill: #FFFFFF; font-weight: 700; }
            .click { fill: #0F172A; }

            @media (prefers-color-scheme: dark) {
                .click { fill: #FFFFFF; }
            }
        </style>
    </defs>

    <!-- Circular Icon -->
    <circle cx="20" cy="20" r="20" fill="url(#gradAuto)"/>

    <!-- Number 1 -->
    <text x="20" y="33" text-anchor="middle"
          class="text number" font-size="35">1</text>

    <!-- Brand Name -->
    <text x="43" y="34"
          class="text click" font-size="35">Click</text>
</svg>