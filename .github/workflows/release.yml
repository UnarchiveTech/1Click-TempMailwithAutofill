name: Build and Release Extensions

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        browser: [chrome, firefox]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lockb', '**/package.json') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install

      - name: Build extension for ${{ matrix.browser }}
        run: bun wxt build --browser ${{ matrix.browser }}

      - name: Zip extension
        run: |
          cd .output/${{ matrix.browser }}-mv3
          zip -r ../../${{ matrix.browser }}-extension.zip .

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.browser }}-extension
          path: ${{ matrix.browser }}-extension.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download Chrome artifact
        uses: actions/download-artifact@v8
        with:
          name: chrome-extension
          path: ./

      - name: Download Firefox artifact
        uses: actions/download-artifact@v8
        with:
          name: firefox-extension
          path: ./

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            chrome-extension.zip
            firefox-extension.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
